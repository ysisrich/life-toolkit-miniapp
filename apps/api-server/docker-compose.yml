version: '3.8'

services:
  api-server:
    build: .
    container_name: life-toolkit-api
    restart: unless-stopped
    ports:
      - "3456:3456"
    environment:
      - PORT=3456
      - DB_PATH=/app/data/database.sqlite
      # 在此处或者通过 env_file 配置你的小程序 AppID 和 Secret
      # - WECHAT_APPID=your_appid
      # - WECHAT_SECRET=your_secret
    env_file:
      - .env
    volumes:
      # 将宿主机的 data 目录挂载到容器内的 /app/data，实现 SQLite 数据持久化
      - ./data:/app/data
